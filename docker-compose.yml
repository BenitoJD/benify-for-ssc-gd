services:
  # ================
  # PostgreSQL Database
  # ================
  postgres:
    image: postgres:16-alpine
    container_name: olli-academy-ssc-gd-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-olli_academy_ssc_gd}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-olli_academy_ssc_gd}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    networks:
      - olli-academy-ssc-gd-network
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
        labels: "service=postgres"

  # ================
  # Redis Cache
  # ================
  redis:
    image: redis:7-alpine
    container_name: olli-academy-ssc-gd-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    networks:
      - olli-academy-ssc-gd-network
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
        labels: "service=redis"

  # ================
  # MinIO Storage (S3-compatible)
  # ================
  minio:
    image: minio/minio:latest
    container_name: olli-academy-ssc-gd-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"  # API port
      - "9001:9001"  # Console port
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    networks:
      - olli-academy-ssc-gd-network
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
        labels: "service=minio"

# ================
# Volumes
# ================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

# ================
# Networks
# ================
networks:
  olli-academy-ssc-gd-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
