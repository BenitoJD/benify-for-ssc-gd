services:
  # ================
  # Nginx Reverse Proxy / Load Balancer
  # ================
  nginx:
    image: nginx:1.27-alpine
    container_name: olli-academy-ssc-gd-nginx
    restart: unless-stopped
    ports:
      - "3100:80"
    volumes:
      - ./apps/web/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    networks:
      - olli-academy-ssc-gd-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=nginx"

  # ================
  # PostgreSQL Database
  # ================
  postgres:
    image: postgres:16-alpine
    container_name: olli-academy-ssc-gd-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-olli_academy_ssc_gd}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-olli_academy_ssc_gd}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    networks:
      - olli-academy-ssc-gd-network
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
        labels: "service=postgres"

  # ================
  # Redis Cache
  # ================
  redis:
    image: redis:7-alpine
    container_name: olli-academy-ssc-gd-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    networks:
      - olli-academy-ssc-gd-network
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
        labels: "service=redis"

  # ================
  # MinIO Storage (S3-compatible)
  # ================
  minio:
    image: minio/minio:latest
    container_name: olli-academy-ssc-gd-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"  # API port
      - "9001:9001"  # Console port
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    networks:
      - olli-academy-ssc-gd-network
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
        labels: "service=minio"

  # ================
  # FastAPI Backend
  # ================
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: olli-academy-ssc-gd-api
    restart: unless-stopped
    environment:
      # App
      APP_NAME: "OLLI Academy(SSC GD) API"
      APP_VERSION: "1.0.0"
      DEBUG: "${DEBUG:-false}"
      # Database - use env vars for credentials
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-olli_academy_ssc_gd}
      # Redis
      REDIS_URL: redis://redis:6379/0
      # MinIO
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: olli-academy-ssc-gd
      MINIO_SECURE: "false"
      # JWT - REQUIRED IN PRODUCTION
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY must be set in production}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 15
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      # CORS
      CORS_ORIGINS: '["http://localhost:3101","http://localhost:3000","http://nginx"]'
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "3101:3100"  # Internal 3100, exposed as 3101
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3100/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    networks:
      - olli-academy-ssc-gd-network
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
        labels: "service=api"

  # ================
  # Next.js Frontend
  # ================
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: olli-academy-ssc-gd-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://nginx/api}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3100}
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "3102:3101"  # Internal 3101, exposed as 3102
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3101/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    networks:
      - olli-academy-ssc-gd-network
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
        labels: "service=web"

# ================
# Volumes
# ================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

# ================
# Networks
# ================
networks:
  olli-academy-ssc-gd-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
