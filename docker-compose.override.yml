services:
  api:
    volumes:
      - ./apps/api:/app
    command:
      [
        "uvicorn",
        "internal.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "3100",
        "--access-log",
        "--reload",
        "--reload-dir",
        "/app/internal",
      ]
    environment:
      DEBUG: "true"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: dev
    command: ["npm", "run", "dev"]
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    environment:
      NODE_ENV: development
      WATCHPACK_POLLING: "true"
