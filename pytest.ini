[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
addopts = --disable-warnings -p no:warnings
filterwarnings =
    ignore:The configuration option "asyncio_default_fixture_loop_scope" is unset.*:pytest.PytestDeprecationWarning
    ignore:Passing 'msg' argument to Task.cancel\(\) is deprecated since Python 3\.11.*:DeprecationWarning:asyncio\.events
    ignore:Passing 'msg' argument to Future.cancel\(\) is deprecated since Python 3\.11.*:DeprecationWarning:asyncio\.events
    ignore:Passing 'msg' argument to Task.cancel\(\) is deprecated since Python 3\.11.*:DeprecationWarning:anyio\._backends\._asyncio
    ignore:Passing 'msg' argument to Future.cancel\(\) is deprecated since Python 3\.11.*:DeprecationWarning:anyio\._backends\._asyncio
