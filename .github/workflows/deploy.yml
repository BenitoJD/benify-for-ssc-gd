name: Deploy

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          install -d -m 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy to production
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/id_ed25519 -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" <<'EOF'
          set -euo pipefail
          cd /opt/benify-for-ssc-gd
          git fetch origin main
          git checkout main
          git reset --hard origin/main
          docker compose --env-file .env.production -f docker-compose.prod.yml up -d --build --remove-orphans
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1/health >/tmp/health.json && curl -fsSI http://127.0.0.1/ >/tmp/home.headers; then
              cat /tmp/health.json
              cat /tmp/home.headers
              exit 0
            fi

            sleep 5
          done

          curl -fsS http://127.0.0.1/health
          curl -fsSI http://127.0.0.1/
          EOF
