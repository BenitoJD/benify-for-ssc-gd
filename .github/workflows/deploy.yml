name: Deploy

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy
        required: true
        default: main

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  packages: write

jobs:
  build-images:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      ghcr_owner: ${{ steps.meta.outputs.ghcr_owner }}
    steps:
      - name: Check out target commit
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}

      - name: Set image metadata
        id: meta
        run: |
          set -euo pipefail
          echo "image_tag=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "ghcr_owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.ghcr_owner }}/benify-for-ssc-gd-api:${{ steps.meta.outputs.image_tag }}
            ghcr.io/${{ steps.meta.outputs.ghcr_owner }}/benify-for-ssc-gd-api:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.meta.outputs.image_tag }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=http://203.57.85.149/api
            NEXT_PUBLIC_BASE_URL=http://203.57.85.149
          tags: |
            ghcr.io/${{ steps.meta.outputs.ghcr_owner }}/benify-for-ssc-gd-web:${{ steps.meta.outputs.image_tag }}
            ghcr.io/${{ steps.meta.outputs.ghcr_owner }}/benify-for-ssc-gd-web:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.meta.outputs.image_tag }}

  deploy:
    needs: build-images
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          install -d -m 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy to production
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          GHCR_OWNER: ${{ needs.build-images.outputs.ghcr_owner }}
          IMAGE_TAG: ${{ needs.build-images.outputs.image_tag }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/id_ed25519 -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "GHCR_OWNER='$GHCR_OWNER' IMAGE_TAG='$IMAGE_TAG' bash -s" <<'EOF'
          set -euo pipefail
          cd /opt/benify-for-ssc-gd
          git fetch origin
          git checkout main
          git reset --hard "$IMAGE_TAG"
          docker compose --env-file .env.production -f docker-compose.prod.yml pull web api
          docker compose --env-file .env.production -f docker-compose.prod.yml up -d --remove-orphans
          docker compose --env-file .env.production -f docker-compose.prod.yml up -d --no-deps --force-recreate nginx
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1/health >/tmp/health.json \
              && curl -fsSI http://127.0.0.1/ >/tmp/home.headers \
              && test "$(curl -s -o /tmp/auth_me.json -w '%{http_code}' http://127.0.0.1/api/v1/auth/me)" = "401"; then
              cat /tmp/health.json
              cat /tmp/home.headers
              cat /tmp/auth_me.json
              exit 0
            fi

            sleep 5
          done

          curl -fsS http://127.0.0.1/health
          curl -fsSI http://127.0.0.1/
          test "$(curl -s -o /tmp/auth_me.json -w '%{http_code}' http://127.0.0.1/api/v1/auth/me)" = "401"
          cat /tmp/auth_me.json
          EOF
