commands:
  install: |
    cd apps/api && pip install -r requirements.txt
    cd apps/web && npm install
  install:frontend: cd apps/web && npm install
  install:backend: cd apps/api && pip install -r requirements.txt
  typecheck:frontend: cd apps/web && npx tsc --noEmit
  lint:frontend: cd apps/web && npm run lint
  test:frontend: cd apps/web && npm run test
  test:backend: cd apps/api && python -m pytest
  test:e2e: cd apps/web && npx playwright test
  build:frontend: cd apps/web && npm run build
  build:backend: cd apps/api && python -m py_compile
  dev:frontend: cd apps/web && npm run dev
  dev:backend: cd apps/api && uvicorn internal.main:app --reload --port 3100 --host 0.0.0.0
  dev:all: docker compose up --build
  db:migrate: cd apps/api && alembic upgrade head
  db:seed: cd apps/api && python -m scripts.seed
  docker:up: docker compose up -d
  docker:down: docker compose down
  docker:build: docker compose build

services:
  postgres:
    start: docker compose up -d postgres
    stop: docker compose stop postgres
    healthcheck: pg_isready -h localhost -p 5432
    port: 5432
    depends_on: []

  redis:
    start: docker compose up -d redis
    stop: docker compose stop redis
    healthcheck: redis-cli ping
    port: 6379
    depends_on: []

  minio:
    start: docker compose up -d minio
    stop: docker compose stop minio
    healthcheck: curl -sf http://localhost:3102/minio/health/live
    port: 3102
    depends_on: []

  api:
    start: cd apps/api && uvicorn internal.main:app --reload --port 3100 --host 0.0.0.0
    stop: lsof -ti :3100 | xargs kill
    healthcheck: curl -sf http://localhost:3100/health
    port: 3100
    depends_on: [postgres, redis]

  web:
    start: cd apps/web && npm run dev
    stop: lsof -ti :3101 | xargs kill
    healthcheck: curl -sf http://localhost:3101
    port: 3101
    depends_on: [api]
